<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Allen T. Woods' New Orleans business directory (1911–1913) — IIIF Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      background: #f5f5f5;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    header h1 { font-size: 15px; font-weight: 700; color: #1a1a1a; }
    #viewer-wrap { flex: 1; position: relative; overflow: hidden; }
    clover-viewer { display: block; position: absolute; inset: 0; }

  </style>
</head>
<body>

<header>
  <h1>Allen T. Woods' New Orleans business directory (1911–1913)</h1>
</header>

<div id="viewer-wrap"></div>

<script>
const DEFAULT_MANIFEST = "https://hadro.github.io/woods-directory/manifest.json";

// ── IIIF Content State helpers ───────────────────────────────────────────────
function decodeContentState() {
  const raw = new URLSearchParams(window.location.search).get("iiif-content");
  if (!raw) return null;
  try {
    const b64 = raw.replace(/-/g, "+").replace(/_/g, "/");
    const padded = b64 + "=".repeat((4 - b64.length % 4) % 4);
    const json = decodeURIComponent(escape(atob(padded)));
    return JSON.parse(json);
  } catch (e) { return null; }
}

// ── Canvas ID translation (NYPL image URL → real canvas ID) ─────────────────
function serviceId(service) {
  if (!service) return "";
  const s = Array.isArray(service) ? service[0] : service;
  return (s && (s.id || s["@id"])) || "";
}

function buildCanvasIndex(manifest) {
  const index = {};
  for (const canvas of (manifest.items || [])) {
    try {
      const body = canvas.items[0].items[0].body;
      const svc = serviceId(body.service);
      if (svc) index[svc] = canvas.id;
    } catch (e) {}
  }
  return index;
}

function oldCanvasToServiceBase(url) {
  return url.replace(/\/full\/.*$/, "");
}

// ── Clover content state (SpecificResource format + blob URL workaround) ─────
function contentStateToBlobId(stateObj) {
  const blob = new Blob([JSON.stringify(stateObj)], { type: "application/json" });
  return URL.createObjectURL(blob);
}

function buildCloverState(manifestId, canvasId, fragment) {
  const csTarget = {
    type: "SpecificResource",
    source: {
      id: canvasId,
      type: "Canvas",
      partOf: [{ id: manifestId, type: "Manifest" }],
    },
  };
  if (fragment) {
    csTarget.selector = { type: "FragmentSelector", value: fragment };
  }
  return {
    "@context": "http://iiif.io/api/presentation/3/context.json",
    id: canvasId + (fragment ? "#" + fragment : "") + "/content-state",
    type: "Annotation",
    motivation: ["contentState"],
    target: csTarget,
  };
}

// ── Close info panel once Clover has zoomed to the content-state target ───────
function closeInfoPanelAfterZoom(el, fallbackMs) {
  let done = false;
  function close() {
    if (done) return;
    done = true;
    obs.disconnect();
    clearTimeout(timer);
    // Clover renders inside shadow DOM — try shadow root first, fall back to light DOM
    const root = el.shadowRoot || el;
    const btn = root.querySelector('[data-value="manifest-back"]');
    if (btn) btn.click();
  }
  const obs = new MutationObserver(mutations => {
    for (const m of mutations) {
      if (m.type === "attributes" && m.attributeName === "class" &&
          m.target.className === "clover-iiif-content-state") {
        close();
        return;
      }
    }
  });
  obs.observe(el, { subtree: true, attributes: true, attributeFilter: ["class"] });
  const timer = setTimeout(close, fallbackMs);
}

// ── Viewer lifecycle ─────────────────────────────────────────────────────────
function launchClover(manifestId, rawCanvasId) {
  const wrap = document.getElementById("viewer-wrap");
  const old = wrap.querySelector("clover-viewer");
  if (old) old.remove();

  const el = document.createElement("clover-viewer");
  el.setAttribute("options", JSON.stringify({showIIIFBadge: false, showDownload: false, informationPanel: {open: false}}));
  el.setAttribute("customTheme", JSON.stringify({colors: {
    accent:         "#1a6ebd",
    accentMuted:    "#4a90d9",
    accentAlt:      "#155a9e"
  }}));

  if (!rawCanvasId) {
    el.setAttribute("id", manifestId);
    wrap.appendChild(el);
    closeInfoPanelAfterZoom(el, 1500);
    return;
  }

  const fragment = rawCanvasId.includes("#") ? rawCanvasId.split("#")[1] : "";
  const oldBase  = rawCanvasId.includes("#") ? rawCanvasId.split("#")[0] : rawCanvasId;

  fetch(manifestId)
    .then(r => r.json())
    .then(manifest => {
      const index = buildCanvasIndex(manifest);
      const svcBase = oldCanvasToServiceBase(oldBase);
      const newCanvasId = index[svcBase] || index[oldBase] || oldBase;
      el.setAttribute("id", contentStateToBlobId(buildCloverState(manifestId, newCanvasId, fragment)));
      wrap.appendChild(el);
      closeInfoPanelAfterZoom(el, 1500);
    })
    .catch(() => {
      el.setAttribute("id", manifestId);
      wrap.appendChild(el);
      closeInfoPanelAfterZoom(el, 1500);
    });
}

// ── Initialise ───────────────────────────────────────────────────────────────
const contentState = decodeContentState();
let startCanvasId = null;

if (contentState) {
  const target = contentState.target || {};
  const source = (target.type === "SpecificResource" && target.source) ? target.source : target;
  startCanvasId = (typeof source === "string" ? source : (source.id || "")).split("#")[0];
  if (source.id && source.id.includes("#")) startCanvasId += "#" + source.id.split("#")[1];
}

launchClover(DEFAULT_MANIFEST, startCanvasId);
</script>

<script src="clover.umd.patched.js"></script>
</body>
</html>
